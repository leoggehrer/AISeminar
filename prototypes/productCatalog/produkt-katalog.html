<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison – Produkt Katalog</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0c0b09;
  --surface:  #131210;
  --surface2: #1a1815;
  --surface3: #222018;
  --gold:     #c9a84c;
  --gold2:    #e8c97a;
  --gold-dim: rgba(201,168,76,0.15);
  --border:   rgba(201,168,76,0.18);
  --border2:  rgba(255,255,255,0.07);
  --text:     #f0ece4;
  --muted:    #7a7060;
  --muted2:   #a09070;
  --green:    #4caf7d;
  --green-bg: rgba(76,175,125,0.12);
  --red:      #e06060;
  --red-bg:   rgba(224,96,96,0.12);
  --radius:   10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ───────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 68px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--gold2);
  text-transform: uppercase;
}

.logo span { font-style: italic; font-weight: 400; color: var(--text); }

.header-meta {
  display: flex;
  align-items: center;
  gap: 20px;
}

.n8n-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--gold-dim);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 13px;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--gold);
  letter-spacing: 0.06em;
}

.live-dot {
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.5); }
  50%      { box-shadow: 0 0 0 5px rgba(201,168,76,0); }
}

/* ── LAYOUT ───────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 320px 1fr;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 68px);
}

/* ── SIDEBAR ──────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-section {
  padding: 24px 24px 20px;
  border-bottom: 1px solid var(--border2);
}

.sec-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-bottom: 16px;
}

/* Stats */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.stat {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 10px;
  text-align: center;
}

.stat-n {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--gold2);
  line-height: 1;
}

.stat-l {
  font-size: 0.62rem;
  color: var(--muted);
  margin-top: 3px;
  font-weight: 300;
}

/* Form */
.form-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 11px;
}

.form-field label {
  font-size: 0.68rem;
  color: var(--muted2);
  font-weight: 500;
  letter-spacing: 0.03em;
}

.form-field input,
.form-field select {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}

.form-field textarea {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
  min-height: 88px;
  resize: vertical;
}

.form-field textarea:focus {
  border-color: var(--gold);
}

.form-field input:focus,
.form-field select:focus { border-color: var(--gold); }
.form-field input::placeholder { color: var(--muted); }
.form-field select option { background: var(--surface2); }

.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.tone-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tone-btn {
  flex: 1;
  min-width: 0;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 7px 6px;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  cursor: pointer;
  text-align: center;
  transition: all 0.18s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.tone-btn:hover { border-color: var(--gold); color: var(--gold); }
.tone-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

.btn-add {
  width: 100%;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 12px;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 0.88rem;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  margin-top: 4px;
  letter-spacing: 0.04em;
}

.btn-add:hover { opacity: 0.88; }
.btn-add:active { transform: scale(0.98); }

.btn-assistant {
  width: 100%;
  margin-top: 2px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  border: 1px solid var(--gold2);
  border-radius: 8px;
  padding: 12px 12px;
  color: var(--bg);
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 0.86rem;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 44px;
  box-shadow: 0 4px 16px rgba(201,168,76,0.25);
  visibility: visible;
  opacity: 1;
}

.btn-assistant:hover {
  filter: brightness(1.04);
}

.btn-assistant:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.assistant-icon {
  width: 14px;
  height: 14px;
  display: inline-block;
}

.form-ai-tags {
  margin-top: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted2);
  line-height: 1.5;
  min-height: 16px;
}

/* Webhook */
.webhook-section {
  padding: 18px 24px;
}

.webhook-section label {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  display: block;
  margin-bottom: 7px;
}

.webhook-section input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  outline: none;
  transition: border-color 0.2s;
}

.webhook-section input:focus { border-color: var(--gold); color: var(--text); }
.webhook-section input::placeholder { color: var(--muted); }

/* ── MAIN CONTENT ─────────────────────────── */
.content {
  overflow-y: auto;
  padding: 32px 36px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.content-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 10px;
}

.content-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text);
}

.content-title em {
  font-style: italic;
  color: var(--gold);
}

.product-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
}

/* Filter row */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.ftab {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  cursor: pointer;
  transition: all 0.18s;
}

.ftab:hover { border-color: var(--gold); color: var(--gold2); }
.ftab.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

/* Grid */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

/* Card */
.product-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  animation: cardIn 0.35s ease;
  display: flex;
  flex-direction: column;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.product-card:hover {
  border-color: var(--border);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* Card color bar by category */
.card-bar {
  height: 3px;
  width: 100%;
}

.bar-elektronik { background: linear-gradient(90deg, #4ca0e0, #7bc4f0); }
.bar-mode       { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
.bar-haushalt   { background: linear-gradient(90deg, #7ac47a, #a0e0a0); }
.bar-sport      { background: linear-gradient(90deg, #e07a4c, #f0a070); }
.bar-beauty     { background: linear-gradient(90deg, #c47ab0, #e0a0d0); }

.card-body {
  padding: 18px 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}

.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 600;
  line-height: 1.25;
  color: var(--text);
  flex: 1;
}

.card-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--gold2);
  white-space: nowrap;
  flex-shrink: 0;
}

.card-meta-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.cat-badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 2px 9px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  color: var(--muted2);
  background: var(--surface2);
}

.stock-badge {
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
}

.stock-ok  { background: var(--green-bg); color: var(--green); }
.stock-low { background: rgba(224,160,70,0.12); color: #e0a046; }
.stock-out { background: var(--red-bg); color: var(--red); }

.tone-badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Description area */
.desc-area {
  flex: 1;
}

.desc-text {
  font-size: 0.82rem;
  line-height: 1.65;
  color: var(--muted2);
  font-weight: 300;
}

.desc-placeholder {
  font-size: 0.78rem;
  color: var(--muted);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
}

.generating-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
  color: var(--gold);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
}

.gen-spinner {
  width: 12px; height: 12px;
  border: 1.5px solid rgba(201,168,76,0.3);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Tags */
.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.56rem;
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--muted2);
  padding: 2px 8px;
  border-radius: 20px;
}

/* Card Footer */
.card-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border2);
  display: flex;
  gap: 8px;
}

.btn-gen {
  flex: 1;
  background: var(--gold-dim);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 8px 10px;
  color: var(--gold);
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  text-align: center;
}

.btn-gen:hover { background: rgba(201,168,76,0.22); }
.btn-gen:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-del {
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 8px 10px;
  color: var(--muted);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.18s;
}

.btn-del:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

/* Empty state */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
}

.empty-state .e-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  display: block;
  opacity: 0.5;
}

.empty-state p {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-style: italic;
  line-height: 1.6;
  color: var(--muted2);
}
</style>
</head>
<body>

<header>
  <div class="logo">Maison <span>Katalog</span></div>
  <div class="header-meta">
    <div class="n8n-pill">
      <div class="live-dot"></div>
      n8n KI-Beschreibungs-Agent
    </div>
  </div>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="sidebar-section">
      <div class="sec-label">// Übersicht</div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-n" id="statTotal">0</div>
          <div class="stat-l">Produkte</div>
        </div>
        <div class="stat">
          <div class="stat-n" id="statDesc" style="color:var(--green)">0</div>
          <div class="stat-l">Mit Text</div>
        </div>
        <div class="stat">
          <div class="stat-n" id="statPending" style="color:var(--gold)">0</div>
          <div class="stat-l">Offen</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sec-label">// Produkt hinzufügen</div>

      <div class="form-field">
        <label>Produktname</label>
        <input type="text" id="fName" placeholder="z.B. Lederjacke Classic">
      </div>

      <div class="form-row-2">
        <div class="form-field">
          <label>Preis (€)</label>
          <input type="number" id="fPrice" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-field">
          <label>Lagerbestand</label>
          <input type="number" id="fStock" placeholder="0" min="0">
        </div>
      </div>

      <div class="form-field">
        <label>Kategorie</label>
        <select id="fCategory">
          <option value="mode">Mode</option>
          <option value="elektronik">Elektronik</option>
          <option value="haushalt">Haushalt</option>
          <option value="sport">Sport</option>
          <option value="beauty">Beauty</option>
        </select>
      </div>

      <div class="form-field">
        <label>Beschreibungs-Ton</label>
        <div class="tone-group" id="toneGroup">
          <button class="tone-btn active" data-tone="luxury" onclick="setTone('luxury', this)">Luxury</button>
          <button class="tone-btn" data-tone="casual" onclick="setTone('casual', this)">Casual</button>
          <button class="tone-btn" data-tone="technical" onclick="setTone('technical', this)">Technisch</button>
        </div>
      </div>

      <div class="form-field">
        <label>Beschreibung</label>
        <textarea id="fDescription" placeholder="Beschreibung wird vom Assistenten erzeugt..."></textarea>
      </div>

      <div class="form-field">
        <button class="btn-assistant" id="btnAssistant" onclick="generateDescriptionForForm()">
          <svg class="assistant-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M5 21v-2a7 7 0 0 1 14 0v2"></path>
            <path d="M19 6l1-1"></path>
            <path d="M5 6l-1-1"></path>
          </svg>
          <span>Assistent: Beschreibung erzeugen</span>
        </button>
        <div class="form-ai-tags" id="fAiTags"></div>
      </div>

      <button class="btn-add" onclick="addProduct()">+ Produkt anlegen</button>
    </div>

    <div class="webhook-section">
      <label>n8n Webhook URL</label>
      <input type="text" id="webhookUrl" placeholder="https://your-n8n.cloud/webhook/...">
    </div>

  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="content-top">
      <div class="content-title">Produkt<em>katalog</em></div>
      <div class="product-count" id="productCount">0 Artikel</div>
    </div>

    <div class="filter-row">
      <button class="ftab active" onclick="setFilter('all', this)">Alle</button>
      <button class="ftab" onclick="setFilter('mode', this)">Mode</button>
      <button class="ftab" onclick="setFilter('elektronik', this)">Elektronik</button>
      <button class="ftab" onclick="setFilter('haushalt', this)">Haushalt</button>
      <button class="ftab" onclick="setFilter('sport', this)">Sport</button>
      <button class="ftab" onclick="setFilter('beauty', this)">Beauty</button>
    </div>

    <div class="product-grid" id="productGrid"></div>
  </div>

</div>

<script>
// ─── STATE ───────────────────────────────────────────────
let products = [
  { id:1, name:'Seidenschal Milano', category:'mode', price:129, stock:14, tone:'luxury',
    description:'Ein Hauch von italienischer Eleganz — dieser handgewebte Seidenschal vereint zeitlose Raffinesse mit modernem Esprit. Für jene, die den Unterschied zu schätzen wissen.',
    tags:['Seide', 'Handgefertigt', 'Italien', 'Luxus'],
    descriptionStatus:'done', createdAt: new Date(Date.now()-86400000*3) },
  { id:2, name:'Wireless Kopfhörer X7', category:'elektronik', price:219, stock:5, tone:'technical',
    description:'40-Stunden Akkulaufzeit, aktive Geräuschunterdrückung der neuesten Generation und Hi-Res Audio-Zertifizierung. Bluetooth 5.3 für verzögerungsfreies Streaming.',
    tags:['Bluetooth 5.3', 'ANC', 'Hi-Res', '40h Akku'],
    descriptionStatus:'done', createdAt: new Date(Date.now()-86400000*2) },
  { id:3, name:'Yoga Mat Naturkautschuk', category:'sport', price:89, stock:32, tone:'casual',
    description:'Deine Basis für jeden Flow. Rutschfest, umweltfreundlich und angenehm griffig — egal ob Morgen-Yoga oder intensives HIIT.',
    tags:['Naturkautschuk', 'rutschfest', 'eco'],
    descriptionStatus:'done', createdAt: new Date(Date.now()-86400000) },
  { id:4, name:'Lederhandtasche Venezia', category:'mode', price:348, stock:0, tone:'luxury',
    description:'', tags:[], descriptionStatus:'none', createdAt: new Date(Date.now()-3600000*6) },
  { id:5, name:'Espressomaschine Barista Pro', category:'haushalt', price:499, stock:8, tone:'casual',
    description:'', tags:[], descriptionStatus:'none', createdAt: new Date() },
];

let nextId = 6;
let currentFilter = 'all';
let currentTone = 'luxury';
let formGeneratedTags = [];

const ASSISTANT_WEBHOOK_URL = 'http://localhost:5678/webhook-test/product-description-ai';

// ─── TONE SELECTOR ────────────────────────────────────────
function setTone(tone, el) {
  currentTone = tone;
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ─── FILTER ───────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

// ─── ADD PRODUCT ──────────────────────────────────────────
function addProduct() {
  const name  = document.getElementById('fName').value.trim();
  const price = parseFloat(document.getElementById('fPrice').value) || 0;
  const stock = parseInt(document.getElementById('fStock').value) || 0;
  const cat   = document.getElementById('fCategory').value;
  const description = document.getElementById('fDescription').value.trim();

  if (!name) { alert('Bitte Produktname eingeben.'); return; }

  const createdTags = formGeneratedTags.slice(0, 5);
  const status = description ? 'done' : 'none';

  products.unshift({
    id: nextId++, name, category: cat, price, stock,
    tone: currentTone, description, tags: createdTags,
    descriptionStatus: status, createdAt: new Date()
  });

  document.getElementById('fName').value = '';
  document.getElementById('fPrice').value = '';
  document.getElementById('fStock').value = '';
  document.getElementById('fDescription').value = '';
  document.getElementById('fAiTags').textContent = '';
  formGeneratedTags = [];
  renderAll();
}

async function generateDescriptionForForm() {
  const name = document.getElementById('fName').value.trim();
  const price = parseFloat(document.getElementById('fPrice').value) || 0;
  const stock = parseInt(document.getElementById('fStock').value) || 0;
  const category = document.getElementById('fCategory').value;
  const button = document.getElementById('btnAssistant');
  const tagsTarget = document.getElementById('fAiTags');

  if (!name) {
    alert('Bitte zuerst einen Produktnamen eingeben.');
    return;
  }

  const payload = {
    product: {
      id: String(nextId),
      name,
      category,
      price: String(price),
      stock: String(stock),
      tone: currentTone
    },
    timestamp: String(Date.now())
  };

  button.disabled = true;
  button.querySelector('span').textContent = 'Assistent arbeitet...';
  tagsTarget.textContent = '';

  try {
    const res = await fetch(ASSISTANT_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const description = typeof data.description === 'string' ? data.description : '';
    const tags = Array.isArray(data.tags) ? data.tags.map(t => String(t)).slice(0, 5) : [];

    document.getElementById('fDescription').value = description;
    formGeneratedTags = tags;
    tagsTarget.textContent = tags.length ? `Tags: ${tags.join(', ')}` : 'Keine Tags geliefert.';
  } catch (err) {
    tagsTarget.textContent = `Fehler beim Assistenten-Aufruf: ${err.message}`;
  } finally {
    button.disabled = false;
    button.querySelector('span').textContent = 'Assistent: Beschreibung erzeugen';
  }
}

// ─── DELETE ───────────────────────────────────────────────
function deleteProduct(id) {
  products = products.filter(p => p.id !== id);
  renderAll();
}

// ─── GENERATE DESCRIPTION ─────────────────────────────────
async function generateDescription(id) {
  const p = products.find(p => p.id === id);
  if (!p || p.descriptionStatus === 'generating') return;

  p.descriptionStatus = 'generating';
  renderAll();

  const webhookUrl = document.getElementById('webhookUrl').value.trim();

  const payload = {
    product: { id: p.id, name: p.name, category: p.category, price: p.price, stock: p.stock, tone: p.tone },
    timestamp: new Date().toISOString()
  };

  try {
    if (webhookUrl) {
      const res = await fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      p.description = data.description || '';
      p.tags = data.tags || [];
    } else {
      await new Promise(r => setTimeout(r, 1600 + Math.random() * 900));
      const demo = demoGenerate(p);
      p.description = demo.description;
      p.tags = demo.tags;
    }
    p.descriptionStatus = 'done';
  } catch(err) {
    p.description = `Fehler: ${err.message}`;
    p.descriptionStatus = 'none';
  }
  renderAll();
}

// ─── DEMO GENERATOR ───────────────────────────────────────
function demoGenerate(p) {
  const templates = {
    luxury: {
      mode: `Zeitlose Eleganz, die in jedem Detail spürbar wird. ${p.name} vereint handwerkliche Perfektion mit modernem Luxusverständnis — ein Stück, das Generationen überdauert. Für ${formatPrice(p.price)} erwerben Sie nicht nur ein Produkt, sondern eine Haltung.`,
      elektronik: `Technische Exzellenz in puristischer Form. ${p.name} setzt neue Maßstäbe in seiner Kategorie — konzipiert für Anspruchsvolle, die keine Kompromisse eingehen. Präzision trifft auf Design.`,
      haushalt: `Häusliche Perfektion beginnt mit der richtigen Wahl. ${p.name} verwandelt jeden Moment in ein Statement — raffiniert, langlebig, unvergleichlich. Willkommen in einer neuen Dimension des Lebens.`,
      sport: `Elite-Performance für außergewöhnliche Menschen. ${p.name} ist das Ergebnis jahrelanger Entwicklung — für jene, die beim Sport dieselben Ansprüche stellen wie im Leben.`,
      beauty: `Schönheit ist eine Kunst — ${p.name} ist Ihr Pinsel. Entwickelt für höchste Ansprüche, veredelnd in der Wirkung, unvergesslich im Erlebnis.`,
    },
    casual: {
      mode: `${p.name} — einfach gut. Lässig, bequem und trotzdem stylisch. Genau das, was du für jeden Tag brauchst, ohne langes Nachdenken.`,
      elektronik: `${p.name} macht einfach Spaß. Easy zu bedienen, zuverlässig und dabei richtig gut. Für ${formatPrice(p.price)} bekommst du echten Mehrwert.`,
      haushalt: `Mach dein Zuhause ein bisschen besser mit ${p.name}. Unkompliziert, praktisch und sieht gut aus — was will man mehr?`,
      sport: `Einfach bewegen mit ${p.name}. Egal ob Anfänger oder Profi, hier macht Sport wieder Spaß. Ab auf die Matte, los geht's!`,
      beauty: `${p.name} — beauty ohne Drama. Einfach auftragen, gut aussehen, fertig. So soll's sein.`,
    },
    technical: {
      mode: `${p.name}: Material-Spezifikation und Verarbeitungsqualität auf Industrieniveau. Strapazierfähige Nähte, dimensionsstabile Konstruktion, pflegeleicht nach DIN-Standard.`,
      elektronik: `${p.name} — technische Eckdaten: optimierte Leistungsaufnahme, erweiterte Kompatibilität, robustes Gehäuse (IK-Rating). Systemvoraussetzungen und vollständige Specs im beiliegenden Datenblatt.`,
      haushalt: `${p.name}: Leistungsklasse A+++, Betriebsspannung 220-240V/50Hz, Schutzklasse IP44. Gefertigt nach aktuellen CE-Normen, 2 Jahre Herstellergarantie inklusive.`,
      sport: `${p.name}: Belastungsgrenze geprüft, Materialzusammensetzung zertifiziert, ergonomisch optimierte Konstruktion. Geeignet für professionellen Einsatz bis zu 120kg Körpergewicht.`,
      beauty: `${p.name}: dermatologisch getestet, hypoallergen, frei von Parabenen und synthetischen Duftstoffen. pH-optimierte Formel (5.5), geeignet für alle Hauttypen inkl. empfindliche Haut.`,
    }
  };

  const catTemplates = templates[p.tone] || templates.casual;
  const description = catTemplates[p.category] || catTemplates.mode;

  const tagSets = {
    mode: ['Qualität', 'Handgefertigt', 'Premium', 'Trendy'],
    elektronik: ['Wireless', 'Smart', 'Certified', 'Energiesparend'],
    haushalt: ['Langlebig', 'Pflegeleicht', 'Design', 'Funktional'],
    sport: ['Performance', 'Outdoor', 'Komfort', 'Pro'],
    beauty: ['Vegan', 'Dermatologisch', 'Natural', 'Pflegend'],
  };

  return {
    description,
    tags: (tagSets[p.category] || []).slice(0, 3 + Math.floor(Math.random() * 2))
  };
}

// ─── RENDER ───────────────────────────────────────────────
function renderAll() {
  renderStats();
  renderGrid();
}

function renderStats() {
  const total   = products.length;
  const withDesc = products.filter(p => p.descriptionStatus === 'done').length;
  const pending  = products.filter(p => p.descriptionStatus === 'none').length;
  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statDesc').textContent    = withDesc;
  document.getElementById('statPending').textContent = pending;
}

function renderGrid() {
  const grid = document.getElementById('productGrid');
  const filtered = currentFilter === 'all'
    ? products
    : products.filter(p => p.category === currentFilter);

  document.getElementById('productCount').textContent = filtered.length + ' Artikel';

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="e-icon">🏷️</span>
        <p>Keine Produkte in dieser Kategorie.<br>Füge dein erstes Produkt hinzu!</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const stockClass = p.stock === 0 ? 'stock-out' : p.stock <= 5 ? 'stock-low' : 'stock-ok';
    const stockLabel = p.stock === 0 ? 'Ausverkauft' : p.stock <= 5 ? `Nur noch ${p.stock}` : `${p.stock} Stk.`;

    const descHTML = p.descriptionStatus === 'generating'
      ? `<div class="generating-row"><div class="gen-spinner"></div>KI generiert Beschreibung…</div>`
      : p.descriptionStatus === 'done' && p.description
        ? `<div class="desc-text">${esc(p.description)}</div>`
        : `<div class="desc-placeholder">Noch keine Beschreibung — KI auf Knopfdruck.</div>`;

    const tagsHTML = p.tags && p.tags.length
      ? `<div class="tag-row">${p.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>`
      : '';

    const genDisabled = p.descriptionStatus === 'generating' ? 'disabled' : '';
    const genLabel = p.descriptionStatus === 'done' ? '✦ Neu generieren' : '✦ Beschreibung generieren';

    return `
      <div class="product-card">
        <div class="card-bar bar-${p.category}"></div>
        <div class="card-body">
          <div class="card-header">
            <div class="card-name">${esc(p.name)}</div>
            <div class="card-price">${formatPrice(p.price)}</div>
          </div>
          <div class="card-meta-row">
            <span class="cat-badge">${p.category}</span>
            <span class="stock-badge ${stockClass}">${stockLabel}</span>
            <span class="tone-badge">${p.tone}</span>
          </div>
          <div class="desc-area">${descHTML}</div>
          ${tagsHTML}
        </div>
        <div class="card-footer">
          <button class="btn-gen" onclick="generateDescription(${p.id})" ${genDisabled}>${genLabel}</button>
          <button class="btn-del" onclick="deleteProduct(${p.id})">✕</button>
        </div>
      </div>
    `;
  }).join('');
}

function formatPrice(p) {
  return new Intl.NumberFormat('de-AT', { style:'currency', currency:'EUR' }).format(p);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── INIT ─────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
