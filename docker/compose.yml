name: n8n-stack

services:

  # ─────────────────────────────────────────
  # PostgreSQL – Hauptdatenbank für n8n
  # ─────────────────────────────────────────
  postgres:
    image: postgres:latest
    container_name: n8n_postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: docker4711%Postgres
      POSTGRES_DB: appdb
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5442:5432"
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # pgvector – PostgreSQL mit Vektor-Extension
  # ─────────────────────────────────────────
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: n8n_pgvector_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: docker4711%PgVector
      POSTGRES_DB: appdb
    ports:
      - "5443:5432"
    volumes:
      - n8n_pgvector_data:/var/lib/postgresql/data
      - ./init/00_enable_pgvector.sql:/docker-entrypoint-initdb.d/00_enable_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # n8n – Workflow Automation
  # ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: appdb
      DB_POSTGRESDB_USER: admin
      DB_POSTGRESDB_PASSWORD: docker4711%Postgres
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Europe/Vienna
      TZ: Europe/Vienna
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

# ─────────────────────────────────────────
# Named Volumes
# ─────────────────────────────────────────
volumes:
  n8n_postgres_data:
    driver: local
  n8n_pgvector_data:
    driver: local
  n8n_data:
    driver: local
